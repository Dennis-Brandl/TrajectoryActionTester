##############################################################################
# Trajectory Action Tester — Docker Compose
#
# Usage:
#   docker compose up --build -d    # build and start
#   docker compose up -d            # start (image already built)
#   docker compose down             # stop
#
# Access:  http://localhost:3004
#
# Standalone static app — no backend, no database. In the UI, point it at
# your Action Container's REST URL (e.g. http://localhost:3002).
##############################################################################

services:
  trajectoryactiontester:
    build: .
    ports:
      - "3004:80"
    restart: unless-stopped
